on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run build
      - name: Sauvegarde du cache.
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

  test: 
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Restauration du cache.
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .next
            /home/runner/work/_actions/cypress-io/github-action/v7/dist/index.js
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
      - run: ls -lah
      - uses: cypress-io/github-action@v7
        with:
          install: false
          start: npm run start
