on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run build
      - name: Sauvegarde du cache.
        uses: actions/cache/save@v5
        with:
          path: 
            node_modules
            .next
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

